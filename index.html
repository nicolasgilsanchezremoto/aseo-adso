<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aseo ADSO - Nicolas Gil Sanchez</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    
    <style>
        :root {
            --sena: #39A900;
            --dark-blue: #00324D;
            --danger: #d32f2f;
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --text-main: #333;
            --text-secondary: #666;
            --border: #dddddd;
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-main: #e0e0e0;
            --text-secondary: #aaaaaa;
            --border: #333;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; padding: 15px; transition: 0.3s; }
        
        .container { 
            max-width: 550px; 
            margin: auto; 
            background: var(--bg-card); 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            text-align: center; 
            position: relative; 
        }

        /* Estilo para la Autoría */
        .credits {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            font-style: italic;
            opacity: 0.8;
        }

        .header { border-bottom: 3px solid var(--sena); margin-bottom: 15px; padding-bottom: 10px; }
        .logo-top { color: var(--sena); font-weight: bold; font-size: 1.5rem; margin: 0; }
        
        .time-box { 
            background: var(--dark-blue); 
            color: white; 
            padding: 8px 15px; 
            border-radius: 50px; 
            display: inline-block; 
            font-size: 0.85rem; 
            font-weight: bold; 
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .status-bar { 
            display: flex; 
            justify-content: space-around; 
            background: #eee; 
            color: #333; 
            padding: 10px; 
            border-radius: 10px; 
            margin-bottom: 15px; 
            font-size: 0.75rem; 
        }
        [data-theme="dark"] .status-bar { background: #2d2d2d; color: #eee; }
        .stat { display: flex; flex-direction: column; }
        .stat b { font-size: 1rem; color: var(--sena); }

        .turno-hoy { display: flex; gap: 10px; margin: 15px 0; }
        .aprendiz-card { 
            background: var(--sena); 
            color: white; 
            padding: 15px; 
            border-radius: 12px; 
            flex: 1; 
            font-weight: bold; 
            text-transform: uppercase; 
            font-size: 0.9rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 50px; 
            box-shadow: 0 4px 10px rgba(57, 169, 0, 0.2);
        }

        .section-title { text-align: left; font-size: 0.85rem; font-weight: bold; color: var(--sena); margin: 20px 0 10px; border-left: 4px solid var(--sena); padding-left: 10px; }
        
        .scroll-table { background: var(--bg-body); border-radius: 10px; max-height: 200px; overflow-y: auto; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th { background: var(--dark-blue); color: white; padding: 10px; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid var(--border); text-align: left; }

        .admin-panel { background: rgba(255,183,77,0.1); border: 2px solid #ffb74d; padding: 15px; border-radius: 15px; display: none; margin-top: 20px; }
        .btn { background: var(--dark-blue); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-danger { background: var(--danger); font-size: 0.7rem; }
        
        .input-text { width: 90%; padding: 10px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-card); color: var(--text-main); text-align: center; }
        .theme-btn { position: absolute; top: 10px; right: 10px; background: none; border: 1px solid var(--sena); color: var(--sena); border-radius: 20px; padding: 5px 10px; cursor: pointer; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="container">
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙 Modo Oscuro</button>
    
    <div class="credits">Software desarrollado por Nicolas Gil Sanchez</div>
    
    <div class="header">
        <p class="logo-top">SENA 3312447</p>
        <p style="color: var(--sena); font-weight: bold; margin:0; font-size: 1.2rem;">ADSO 2026-2028</p>
    </div>

    <div class="time-box" id="relojFull">---</div>

    <div class="status-bar">
        <div class="stat"><span id="cicloActual">Ciclo 1</span></div>
        <div class="stat"><span>Activos:</span><b id="countActivos">--</b></div>
        <div class="stat"><span>Restantes:</span><b id="countFaltan">-- Parejas</b></div>
    </div>

    <p style="font-weight: bold; font-size: 0.9rem; margin-bottom: 5px;">PAREJA EN FORMACIÓN:</p>
    <div class="turno-hoy">
        <div id="p1" class="aprendiz-card">---</div>
        <div id="p2" class="aprendiz-card">---</div>
    </div>

    <div class="section-title">🔮 PRONÓSTICO DEL CICLO (Próximos turnos)</div>
    <div class="scroll-table">
        <table>
            <thead><tr><th>Orden</th><th>Aprendices Encargados</th></tr></thead>
            <tbody id="tablaPronostico"></tbody>
        </table>
    </div>

    <div class="section-title">📜 ÚLTIMOS REGISTROS</div>
    <div class="scroll-table">
        <table id="tablaHistorial"></table>
    </div>

    <div id="loginForm" style="margin-top:20px; border-top: 1px solid var(--border); padding-top: 20px;">
        <input type="email" id="email" class="input-text" placeholder="Email Monitor">
        <input type="password" id="pass" class="input-text" placeholder="Contraseña">
        <button class="btn" onclick="login()">Acceder al Panel</button>
    </div>

    <div id="adminPanel" class="admin-panel">
        <p style="margin: 0 0 10px 0; color: #ffb74d;"><b>🔓 PANEL DE CONTROL</b></p>
        <button class="btn" onclick="marcarRealizado()">✅ CONFIRMAR ASEO REALIZADO</button>
        <button class="btn" style="background:#607d8b" onclick="saltarPareja()">⏭️ SALTAR PAREJA</button>
        <button class="btn btn-danger" onclick="resetearTodo()">⚠️ RESETEAR TODO EL SISTEMA</button>
        <button class="btn" style="background:#666" onclick="logout()">Cerrar Sesión</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCsPnOjs3A8-7M8W75HyWwdHvgHTLlfhQA",
        authDomain: "aseo-adso.firebaseapp.com",
        databaseURL: "https://aseo-adso-default-rtdb.firebaseio.com",
        projectId: "aseo-adso",
        storageBucket: "aseo-adso.firebasestorage.app",
        messagingSenderId: "490640568451",
        appId: "1:490640568451:web:6983d250b50be427f22bb6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);

    // --- RELOJ ACTUALIZADO CON AÑO ---
    setInterval(() => {
        const ahora = new Date();
        const opciones = { 
            weekday: 'short', 
            day: '2-digit', 
            month: 'short', 
            year: 'numeric' 
        };
        const fecha = ahora.toLocaleDateString('es-CO', opciones);
        const hora = ahora.toLocaleTimeString('es-CO');
        document.getElementById('relojFull').innerText = `${fecha.toUpperCase()} | ${hora}`;
    }, 1000);

    // --- TEMAS ---
    function toggleTheme() {
        const current = document.body.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        document.getElementById('themeBtn').innerText = next === 'dark' ? '☀️ Modo Claro' : '🌙 Modo Oscuro';
    }
    if(localStorage.getItem('theme') === 'dark') toggleTheme();

    // --- SESIÓN ---
    function login() {
        auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value).catch(e => alert(e.message));
    }
    function logout() { auth.signOut(); }
    auth.onAuthStateChanged(user => {
        document.getElementById('adminPanel').style.display = user ? 'block' : 'none';
        document.getElementById('loginForm').style.display = user ? 'none' : 'block';
    });

    // --- LÓGICA CORE ---
    db.ref('sistema_aseo').on('value', snap => {
        const data = snap.val();
        if(!data) return;

        const lista = data.aprendices_en_ciclo || [];
        const base = data.base_aprendices || [];

        document.getElementById('countActivos').innerText = base.length;
        document.getElementById('countFaltan').innerText = Math.ceil(lista.length / 2) + " Parejas";
        document.getElementById('cicloActual').innerText = "Ciclo " + (data.num_ciclo || 1);

        document.getElementById('p1').innerText = lista[0] || "---";
        document.getElementById('p2').innerText = lista[1] || "---";

        const pronosticoBody = document.getElementById('tablaPronostico');
        pronosticoBody.innerHTML = "";
        for(let i = 2; i < lista.length; i += 2) {
            const p1 = lista[i];
            const p2 = lista[i+1] || "(Solo)";
            pronosticoBody.innerHTML += `<tr><td>Siguiente ${i/2}</td><td>${p1} y ${p2}</td></tr>`;
        }

        const histTable = document.getElementById('tablaHistorial');
        histTable.innerHTML = "<thead><tr><th>Fecha</th><th>Realizado por</th></tr></thead>";
        if(data.historial) {
            Object.values(data.historial).reverse().slice(0,5).forEach(h => {
                histTable.innerHTML += `<tr><td>${h.fecha}</td><td>${h.nombres}</td></tr>`;
            });
        }
    });

    function marcarRealizado() {
        const n1 = document.getElementById('p1').innerText;
        const n2 = document.getElementById('p2').innerText;
        if(n1 === "---") return;

        if(confirm(`¿Confirmar que ${n1} y ${n2} hicieron el aseo?`)) {
            db.ref('sistema_aseo').once('value', snap => {
                const data = snap.val();
                let lista = data.aprendices_en_ciclo;
                db.ref('sistema_aseo/historial').push({
                    fecha: new Date().toLocaleDateString('es-CO', {day:'2-digit', month:'2-digit', year:'numeric'}),
                    nombres: `${n1} y ${n2}`
                });
                lista.splice(0, 2);
                if(lista.length === 0) {
                    const nuevaLista = shuffle([...data.base_aprendices]);
                    db.ref('sistema_aseo').update({
                        aprendices_en_ciclo: nuevaLista,
                        num_ciclo: (data.num_ciclo || 1) + 1
                    });
                } else {
                    db.ref('sistema_aseo/aprendices_en_ciclo').set(lista);
                }
            });
        }
    }

    function saltarPareja() {
        if(confirm("¿Saltar esta pareja? Se moverán al final de este ciclo.")) {
            db.ref('sistema_aseo').once('value', snap => {
                let lista = snap.val().aprendices_en_ciclo;
                const saltados = lista.splice(0, 2);
                lista.push(...saltados);
                db.ref('sistema_aseo/aprendices_en_ciclo').set(lista);
            });
        }
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function resetearTodo() {
        if(confirm("⚠️ ¿BORRAR TODO Y REINICIAR?")) {
            db.ref('sistema_aseo/base_aprendices').once('value', snap => {
                const base = snap.val();
                db.ref('sistema_aseo').set({
                    base_aprendices: base,
                    aprendices_en_ciclo: [...base],
                    num_ciclo: 1,
                    historial: {}
                });
            });
        }
    }
</script>
</body>
</html>
