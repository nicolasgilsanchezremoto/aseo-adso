<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aseo ADSO Pro - Gestión Dinámica</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    
    <style>
        :root {
            --sena: #39A900; --dark-blue: #00324D; --danger: #d32f2f;
            --bg-body: #f4f7f6; --bg-card: #ffffff; --text-main: #333;
            --text-secondary: #666; --border: #dddddd;
        }

        [data-theme="dark"] {
            --bg-body: #121212; --bg-card: #1e1e1e; --text-main: #e0e0e0;
            --text-secondary: #aaa; --border: #333;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; padding: 10px; transition: 0.3s; }
        .container { max-width: 600px; margin: auto; background: var(--bg-card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        
        .header { border-bottom: 3px solid var(--sena); margin-bottom: 15px; padding-bottom: 10px; }
        .logo-top { color: var(--sena); font-weight: bold; font-size: 1.4rem; margin: 0; }
        
        .time-box { display: flex; justify-content: space-between; background: var(--dark-blue); color: white; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 0.8rem; }
        
        .aprendiz-card { background: var(--sena); color: white; padding: 15px; border-radius: 12px; flex: 1; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; }
        .turno-container { display: flex; gap: 10px; margin: 15px 0; }

        .section-title { text-align: left; font-size: 0.9rem; font-weight: bold; border-left: 4px solid var(--sena); padding-left: 10px; margin: 20px 0 10px; }
        
        .table-container { background: var(--bg-body); border-radius: 10px; max-height: 150px; overflow-y: auto; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th { background: var(--dark-blue); color: white; padding: 8px; position: sticky; top: 0; }
        td { padding: 8px; border-bottom: 1px solid var(--border); text-align: left; }

        .admin-panel { background: rgba(255,183,77,0.1); border: 2px solid #ffb74d; padding: 15px; border-radius: 15px; display: none; margin-top: 20px; }
        .btn { background: var(--dark-blue); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 8px; font-weight: bold; font-size: 0.8rem; }
        .btn-danger { background: var(--danger); }
        .btn-small { width: auto; padding: 5px 10px; font-size: 0.7rem; }
        
        .input-text { width: 90%; padding: 10px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-card); color: var(--text-main); }
        .theme-toggle { cursor: pointer; background: var(--sena); color: white; border: none; padding: 5px 10px; border-radius: 20px; font-size: 0.7rem; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Modo Oscuro</button>
    
    <div class="header">
        <p class="logo-top">SENA 3312447</p>
        <p style="color: var(--sena); font-weight: bold; margin:0;">ADSO 2026-2028</p>
    </div>

    <div class="time-box">
        <span id="fechaActual">---</span>
        <span id="reloj">00:00:00</span>
    </div>

    <p style="font-size: 0.8rem; font-weight: bold;">PAREJA DE HOY:</p>
    <div class="turno-container">
        <div id="p1" class="aprendiz-card">---</div>
        <div id="p2" class="aprendiz-card">---</div>
    </div>

    <div class="section-title">🔮 PROYECCIÓN (Siguientes en la lista)</div>
    <div class="table-container">
        <table>
            <thead><tr><th>Aprendiz</th><th>Estado</th></tr></thead>
            <tbody id="tablaProyeccion"></tbody>
        </table>
    </div>

    <div class="section-title">📜 HISTORIAL DE CUMPLIMIENTO</div>
    <div class="table-container">
        <table id="tablaHistorial"></table>
    </div>

    <div id="loginForm" style="margin-top:20px; padding-top:10px; border-top: 1px solid var(--border);">
        <input type="email" id="email" class="input-text" placeholder="Email Monitor">
        <input type="password" id="pass" class="input-text" placeholder="Contraseña">
        <button class="btn" onclick="login()">Acceder como Administrador</button>
    </div>

    <div id="adminPanel" class="admin-panel">
        <p><b>⚙️ GESTIÓN AVANZADA</b></p>
        <button class="btn" onclick="confirmarTurno()">✅ MARCAR COMO REALIZADO</button>
        <button class="btn" style="background:#607d8b" onclick="saltarPareja()">⏭️ SALTAR PAREJA (PENDIENTE)</button>
        
        <div style="margin-top:15px; border-top:1px solid #ffb74d; padding-top:10px;">
            <input type="text" id="nuevoAprendiz" class="input-text" placeholder="Nombre completo">
            <button class="btn btn-small" onclick="agregarAprendiz()">Añadir Aprendiz</button>
        </div>

        <button class="btn btn-danger" onclick="resetearSistema()">🔥 REINICIAR TODO EL SISTEMA</button>
        <button class="btn" style="background:#666" onclick="logout()">Cerrar Sesión</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCsPnOjs3A8-7M8W75HyWwdHvgHTLlfhQA",
        authDomain: "aseo-adso.firebaseapp.com",
        databaseURL: "https://aseo-adso-default-rtdb.firebaseio.com",
        projectId: "aseo-adso",
        storageBucket: "aseo-adso.firebasestorage.app",
        messagingSenderId: "490640568451",
        appId: "1:490640568451:web:6983d250b50be427f22bb6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);

    // --- RELOJ ---
    setInterval(() => {
        const ahora = new Date();
        document.getElementById('fechaActual').innerText = ahora.toLocaleDateString('es-CO', {weekday:'short', day:'2-digit', month:'short'}).toUpperCase();
        document.getElementById('reloj').innerText = ahora.toLocaleTimeString('es-CO');
    }, 1000);

    // --- TEMAS ---
    function toggleTheme() {
        const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        document.getElementById('themeBtn').innerText = theme === 'dark' ? '☀️ Modo Claro' : '🌙 Modo Oscuro';
    }
    if(localStorage.getItem('theme') === 'dark') { toggleTheme(); }

    // --- AUTH ---
    function login() {
        auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value)
            .catch(e => alert("Error: " + e.message));
    }
    function logout() { auth.signOut(); }
    auth.onAuthStateChanged(user => {
        document.getElementById('adminPanel').style.display = user ? 'block' : 'none';
        document.getElementById('loginForm').style.display = user ? 'none' : 'block';
    });

    // --- LÓGICA DE NEGOCIO ---
    db.ref('sistema_aseo').on('value', snap => {
        const data = snap.val() || { aprendices: [], pendientes: [], historial: [] };
        actualizarPantalla(data);
    });

    function actualizarPantalla(data) {
        const lista = data.aprendices || [];
        const pendientes = data.pendientes || [];
        
        // La pareja actual siempre son los dos primeros de la lista "aprendices"
        document.getElementById('p1').innerText = lista[0] || "FIN";
        document.getElementById('p2').innerText = lista[1] || "CICLO";

        // Proyección
        const tbody = document.getElementById('tablaProyeccion');
        tbody.innerHTML = "";
        
        // Primero mostrar pendientes (si existen)
        pendientes.forEach(p => {
            tbody.innerHTML += `<tr style="color:var(--danger)"><td>${p}</td><td>⚠️ PENDIENTE</td></tr>`;
        });
        
        // Mostrar resto de la lista (después de los 2 actuales)
        lista.slice(2).forEach(p => {
            tbody.innerHTML += `<tr><td>${p}</td><td>Próximamente</td></tr>`;
        });

        // Historial
        const histTable = document.getElementById('tablaHistorial');
        histTable.innerHTML = "<thead><tr><th>Fecha</th><th>Aprendices</th></tr></thead>";
        if(data.historial) {
            Object.values(data.historial).reverse().forEach(h => {
                histTable.innerHTML += `<tr><td>${h.fecha}</td><td>${h.nombres}</td></tr>`;
            });
        }
    }

    function confirmarTurno() {
        const n1 = document.getElementById('p1').innerText;
        const n2 = document.getElementById('p2').innerText;
        if(n1 === "FIN") return alert("No hay aprendices en lista");

        if(confirm(`¿Confirmar que ${n1} y ${n2} hicieron el aseo?`)) {
            db.ref('sistema_aseo').once('value', snap => {
                const data = snap.val();
                let lista = data.aprendices;
                let pendientes = data.pendientes || [];

                // 1. Guardar historial
                db.ref('sistema_aseo/historial').push({
                    fecha: new Date().toLocaleDateString('es-CO'),
                    nombres: `${n1} y ${n2}`
                });

                // 2. Eliminar del frente de la lista
                lista.splice(0, 2);

                // 3. Si la lista se vacía, REINICIAR CICLO CON PAREJAS NUEVAS
                if(lista.length <= 1) {
                    alert("¡Ciclo completado! Generando nuevas parejas mezcladas...");
                    lista = mezclarParejas(data.base_aprendices);
                }

                db.ref('sistema_aseo/aprendices').set(lista);
            });
        }
    }

    function saltarPareja() {
        const n1 = document.getElementById('p1').innerText;
        const n2 = document.getElementById('p2').innerText;

        if(confirm(`¿Saltar a ${n1} y ${n2}? Se marcarán como pendientes para el próximo turno.`)) {
            db.ref('sistema_aseo').once('value', snap => {
                const data = snap.val();
                let lista = data.aprendices;
                let pendientes = data.pendientes || [];

                // Los quitamos de la lista actual
                const saltados = lista.splice(0, 2);
                
                // Los añadimos a pendientes para que no se escapen
                pendientes.push(...saltados);

                db.ref('sistema_aseo').update({
                    aprendices: lista,
                    pendientes: pendientes
                });
            });
        }
    }

    function agregarAprendiz() {
        const nombre = document.getElementById('nuevoAprendiz').value.toUpperCase();
        if(!nombre) return;
        
        db.ref('sistema_aseo/base_aprendices').once('value', snap => {
            const base = snap.val() || [];
            base.push(nombre);
            db.ref('sistema_aseo/base_aprendices').set(base);
            alert("Aprendiz añadido a la base de datos.");
        });
    }

    function mezclarParejas(array) {
        let copia = [...array];
        for (let i = copia.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [copia[i], copia[j]] = [copia[j], copia[i]];
        }
        return copia;
    }

    function resetearSistema() {
        if(confirm("¿RESET TOTAL? Se borrará historial y se usará la lista de aprendices actual para un ciclo nuevo.")) {
            db.ref('sistema_aseo/base_aprendices').once('value', snap => {
                const base = snap.val();
                db.ref('sistema_aseo').set({
                    base_aprendices: base,
                    aprendices: mezclarParejas(base),
                    pendientes: [],
                    historial: {}
                });
            });
        }
    }
</script>
</body>
</html>
